name: Publish Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [api, web, worker]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            APP_NAME=${{ matrix.app }}
            NEXT_PUBLIC_API_URL=
          tags: |
            ghcr.io/${{ github.repository_owner }}/stock-market-master-${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/stock-market-master-${{ matrix.app }}:latest
