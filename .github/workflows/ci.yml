name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: stock_market
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U user -d stock_market"
          --health-interval 5s --health-timeout 5s --health-retries 12
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/stock_market
      JWT_SECRET: ci-only-secret
      APP_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc=
      LLM_BASE_URL: http://localhost:11434/v1
      LLM_MODEL: test-model
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:migrate:deploy -w @repo/database
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
