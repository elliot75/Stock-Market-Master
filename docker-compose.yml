services:
  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=api
    environment:
      DATABASE_URL: postgresql://user:password@database:5432/stock_market
      JWT_SECRET: your-secret
    ports:
      - "3001:3001"
    depends_on:
      - database

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=worker
    environment:
      DATABASE_URL: postgresql://user:password@database:5432/stock_market
    depends_on:
      - database

volumes:
  postgres_data:
