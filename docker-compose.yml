services:
  database:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stock_market
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=api
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@database:5432/stock_market
      JWT_SECRET: ${JWT_SECRET}
      APP_URL: ${APP_URL}
    ports:
      - "3001:3001"
    depends_on:
      - database

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=web
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_NAME=worker
    restart: always
    environment:
      DATABASE_URL: postgresql://user:password@database:5432/stock_market
    depends_on:
      - database

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - web
      - api

volumes:
  postgres_data:
